<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제32회 삼성휴먼테크논문대상 은상 수상 후기 - Hogyun Kim</title>
    <link rel="shortcut icon" href="../images/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .post-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: var(--bg-primary);
            min-height: 100vh;
        }

        .back-to-posts {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 32px;
            transition: all 0.2s ease;
        }

        .back-to-posts:hover {
            color: var(--primary-hover);
            transform: translateX(-2px);
        }

        .post-header {
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
        }

        .post-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .post-category {
            background: #e0f2fe;
            color: #0277bd;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        [data-theme="dark"] .post-category {
            background: #0d47a1;
            color: #81d4fa;
        }

        .post-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .post-content h2 {
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
            margin: 32px 0 16px 0;
            border-left: 4px solid var(--primary-color);
            padding-left: 16px;
        }

        .post-content h3 {
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 600;
            margin: 24px 0 12px 0;
        }

        .post-content p {
            margin-bottom: 20px;
        }

        .post-content ul {
            margin: 16px 0;
            padding-left: 24px;
        }

        .post-content li {
            margin-bottom: 8px;
        }

        .post-content blockquote {
            border-left: 4px solid var(--primary-color);
            margin: 24px 0;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }

        .post-content em {
            color: var(--text-primary);
            font-weight: 500;
            font-style: normal;
        }

        .highlight-box {
            background: var(--highlight-bg);
            padding: 20px;
            border-radius: 8px;
            margin: 24px 0;
            border-left: 4px solid #f59e0b;
        }

        [data-theme="dark"] .highlight-box {
            background: #451a03;
        }

        @media (max-width: 768px) {
            .post-container {
                padding: 24px 16px;
            }
            
            .post-title {
                font-size: 1.8rem;
            }
            
            .post-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="post-container">
        <a href="../posts.html" class="back-to-posts">
            <i class="fas fa-arrow-left"></i>
            포스트 목록으로 돌아가기
        </a>

        <div class="post-header">
            <h1 class="post-title">제32회 삼성휴먼테크논문대상 은상 수상 후기</h1>
            <div class="post-meta">
                <span><i class="fas fa-calendar"></i> 2026년 2월 15일</span>
                <span class="post-category">Personal</span>
                <span><i class="fas fa-clock"></i> 8분 읽기</span>
            </div>
        </div>

        <div class="post-content">
            <p>여기에 삼성휴먼테크논문대상 수상 후기를 작성해주세요...</p>
            
            <h2>섹션 제목 예시</h2>
            <p>내용을 작성해주세요.</p>
            
            <h3>하위 섹션</h3>
            <p>더 자세한 내용을 작성해주세요.</p>
            
            <div class="highlight-box">
                <p><strong>💡 팁:</strong> 이런 박스를 사용해서 중요한 포인트를 강조할 수 있습니다.</p>
            </div>
            
            <blockquote>
                "인용문이나 특별한 말을 넣고 싶을 때 이렇게 사용하세요."
            </blockquote>
            
            <ul>
                <li><strong>굵은 글씨</strong>로 중요한 항목</li>
                <li><em>기울임</em>으로 강조</li>
                <li>일반적인 리스트 아이템</li>
            </ul>
        </div>
    </div>

    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        });
    </script>
</body>
</html>
