<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts - Hogyun Kim</title>
    <link rel="shortcut icon" href="images/favicon/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css">
    <style>
        /* Posts page specific styles */
        .posts-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
            background: var(--bg-primary);
            min-height: 100vh;
        }

        .back-to-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 24px;
            transition: all 0.2s ease;
        }

        .back-to-home:hover {
            color: var(--primary-hover);
            transform: translateX(-2px);
        }

        .posts-header {
            margin-bottom: 40px;
        }

        .posts-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .posts-intro {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .posts-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 32px;
        }

        .post-item {
            display: grid;
            grid-template-columns: 120px 1fr 80px;
            gap: 20px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
        }

        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-left-color: var(--primary-hover);
        }

        .post-date {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .post-content {
            color: var(--text-primary);
        }

        .post-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .post-excerpt {
            color: var(--text-secondary);
            line-height: 1.5;
            font-size: 0.9rem;
        }

        .post-category {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 500;
            text-align: center;
            white-space: nowrap;
            align-self: start;
        }

        .category-personal {
            background: #e0f2fe;
            color: #0277bd;
        }

        .category-research {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .category-technical {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .category-conference {
            background: #fff3e0;
            color: #ef6c00;
        }

        [data-theme="dark"] .category-personal {
            background: #0d47a1;
            color: #81d4fa;
        }

        [data-theme="dark"] .category-research {
            background: #4a148c;
            color: #ce93d8;
        }

        [data-theme="dark"] .category-technical {
            background: #1b5e20;
            color: #a5d6a7;
        }

        [data-theme="dark"] .category-conference {
            background: #bf360c;
            color: #ffcc02;
        }

        @media (max-width: 768px) {
            .posts-page {
                padding: 24px;
            }
            
            .post-item {
                grid-template-columns: 1fr;
                gap: 12px;
                text-align: left;
                padding: 16px;
            }
            
            .post-date {
                font-size: 0.8rem;
            }
            
            .post-category {
                justify-self: start;
                width: fit-content;
            }
        }
    </style>
</head>
<body>
    <div class="posts-page">
        <a href="index.html" class="back-to-home">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>

        <div class="posts-header">
            <h1>Posts</h1>
            <p class="posts-intro">
                Welcome to my blog! Here I share personal thoughts, research insights, and experiences from my PhD journey in robotics and AI.
            </p>
        </div>

        <div class="posts-grid">
            <a href="posts/samsung-humantech-review.html" class="post-item">
                <span class="post-date">2026.02.15</span>
                <div class="post-content">
                    <div class="post-title">제32회 삼성휴먼테크논문대상 은상 수상 후기</div>
                    <div class="post-excerpt">삼성휴먼테크논문대상에 도전하게 된 계기부터 수상까지의 경험, 그리고 이 과정에서 얻은 값진 교훈들을 공유합니다...</div>
                </div>
                <span class="post-category category-personal">Personal</span>
            </a>
        </div>
    </div>

    <script>
        // Theme toggle functionality
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        });
    </script>
</body>
</html>
